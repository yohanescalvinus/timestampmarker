<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Timestamp Report - With Map Picker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.2s ease, color 0.2s ease;
        }

        /* ========== THEME VARIABLES ========== */
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: clamp(12px, 3vw, 24px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Light Theme */
        body.light-theme {
            background: linear-gradient(135deg, #f0f2f5 0%, #e6e9f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2e3a;
            --text-secondary: #4b5563;
            --border-light: #e2e8f0;
            --preview-bg: #f8fafc;
            --info-bg: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --info-text: white;
            --msg-preview-bg: #f1f5f9;
            --msg-text: #1f2e3a;
            --status-bg: #eef2ff;
            --status-text: #1f3a5f;
            --btn-icon-bg: #f1f5f9;
            --btn-icon-hover: #e2e8f0;
            --manual-bg: #fffbeb;
            --manual-border: #fcd34d;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.1);
            --modal-overlay: rgba(0,0,0,0.5);
        }

        /* Dark Theme (Default) */
        body.dark-theme {
            background: linear-gradient(135deg, #0a0c15 0%, #0f111a 100%);
            --card-bg: rgba(30, 31, 44, 0.95);
            --text-primary: #e2e8f0;
            --text-secondary: #9ca3af;
            --border-light: #2d3748;
            --preview-bg: #2a2b3a;
            --info-bg: linear-gradient(135deg, #0f111a 0%, #1a1c2a 100%);
            --info-text: #e2e8f0;
            --msg-preview-bg: #2a2b3a;
            --msg-text: #e2e8f0;
            --status-bg: #2d3748;
            --status-text: #cbd5e1;
            --btn-icon-bg: #2d3748;
            --btn-icon-hover: #3b4252;
            --manual-bg: #2d2a1a;
            --manual-border: #b45309;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.3);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.4);
            --modal-overlay: rgba(0,0,0,0.7);
        }

        .card {
            max-width: 1200px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: clamp(24px, 5vw, 40px);
            padding: clamp(20px, 4vw, 32px);
            box-shadow: var(--shadow-md);
        }

        /* ========== LIQUID GRID LAYOUT ========== */
        .liquid-container {
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 3vw, 24px);
            transition: all 0.3s ease;
        }

        /* LAYOUT MODE - LANDSCAPE (user selected) */
        .liquid-container.landscape-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .liquid-container.landscape-layout .left-section {
            grid-column: 1;
        }
        
        .liquid-container.landscape-layout .right-section {
            grid-column: 2;
        }
        
        .liquid-container.landscape-layout .full-width {
            grid-column: 1 / -1;
        }
        
        .liquid-container.landscape-layout .preview img {
            max-height: 250px;
        }
        
        .liquid-container.landscape-layout .info {
            margin-bottom: 0;
        }
        
        .liquid-container.landscape-layout .btn-group {
            flex-direction: row;
        }

        /* LAYOUT MODE - PORTRAIT (default) */
        .liquid-container.portrait-layout {
            display: flex;
            flex-direction: column;
            gap: clamp(16px, 3vw, 24px);
        }
        
        .liquid-container.portrait-layout .preview img {
            max-height: clamp(150px, 30vh, 280px);
        }
        
        .liquid-container.portrait-layout .btn-group {
            flex-direction: column;
        }
        
        @media (min-width: 768px) {
            .liquid-container.portrait-layout .btn-group {
                flex-direction: row;
            }
        }

        /* Untuk tablet potrait */
        @media (min-width: 768px) and (orientation: portrait) {
            .card {
                max-width: 600px;
            }
            
            .liquid-container.portrait-layout .preview img {
                max-height: 220px;
            }
        }

        /* Untuk layar desktop besar */
        @media (min-width: 1024px) {
            .card {
                max-width: 1100px;
            }
            
            .liquid-container {
                gap: 32px;
            }
            
            .preview img {
                max-height: 300px;
            }
            
            .time {
                font-size: 2.5rem;
            }
        }

        /* Untuk mobile landscape - tetap mengikuti layout yang dipilih user */
        @media (max-width: 767px) and (orientation: landscape) {
            .card {
                max-width: 95%;
            }
            
            .liquid-container.landscape-layout .preview img {
                max-height: 150px;
            }
            
            .liquid-container.landscape-layout .time {
                font-size: 1.5rem;
            }
            
            .liquid-container.portrait-layout .preview img {
                max-height: 150px;
            }
        }

        /* Settings Bar - 3 tombol toggle */
        .settings-bar {
            display: flex;
            justify-content: flex-end;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: clamp(12px, 2vw, 20px);
            flex-wrap: wrap;
        }
        
        .settings-btn {
            background: var(--btn-icon-bg);
            border: none;
            padding: clamp(6px, 1.5vw, 10px) clamp(12px, 2vw, 18px);
            border-radius: 40px;
            cursor: pointer;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .settings-btn:hover {
            opacity: 0.85;
            transform: scale(0.98);
        }
        
        .settings-btn:active {
            transform: scale(0.95);
        }

        .header {
            text-align: center;
            margin-bottom: clamp(16px, 3vw, 24px);
        }
        
        .header i {
            font-size: clamp(32px, 6vw, 48px);
            color: #25D366;
            background: rgba(37, 211, 102, 0.15);
            padding: clamp(10px, 2vw, 14px);
            border-radius: 60px;
        }
        
        .header h1 {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            margin-top: 12px;
            color: var(--text-primary);
        }
        
        .header p {
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .image-buttons {
            display: flex;
            gap: clamp(10px, 2vw, 16px);
            margin-bottom: clamp(16px, 3vw, 24px);
            flex-wrap: wrap;
        }
        
        .btn-icon {
            flex: 1;
            min-width: 120px;
            background: var(--btn-icon-bg);
            border: none;
            padding: clamp(12px, 2.5vw, 16px);
            border-radius: 60px;
            font-weight: 600;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            opacity: 0.85;
            transform: scale(0.98);
        }
        
        .btn-icon:active {
            transform: scale(0.96);
            background: var(--btn-icon-hover);
        }

        .preview {
            background: var(--preview-bg);
            border-radius: clamp(16px, 3vw, 24px);
            padding: clamp(12px, 2vw, 16px);
            text-align: center;
            margin-bottom: clamp(16px, 3vw, 20px);
            border: 1px solid var(--border-light);
        }
        
        .preview img {
            max-width: 100%;
            border-radius: clamp(12px, 2vw, 20px);
            object-fit: contain;
        }
        
        .preview-text {
            font-size: clamp(10px, 1.8vw, 12px);
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .info {
            background: var(--info-bg);
            border-radius: clamp(20px, 4vw, 28px);
            padding: clamp(14px, 2.5vw, 20px);
            margin-bottom: clamp(16px, 3vw, 20px);
            color: var(--info-text);
            box-shadow: var(--shadow-sm);
        }
        
        .time {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .date {
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            opacity: 0.85;
            margin-bottom: 12px;
        }
        
        .loc {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.12);
            padding: clamp(8px, 1.8vw, 12px);
            border-radius: 20px;
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            word-break: break-all;
            flex-wrap: wrap;
        }
        
        .loc-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        .refresh-loc, .pick-loc {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: clamp(9px, 1.5vw, 11px);
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .refresh-loc:hover, .pick-loc:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .refresh-loc:active, .pick-loc:active {
            transform: scale(0.95);
        }

        .btn-group {
            display: flex;
            gap: clamp(10px, 2vw, 16px);
            margin-bottom: clamp(12px, 2vw, 16px);
            flex-wrap: wrap;
        }
        
        .liquid-container.portrait-layout .btn-group {
            flex-direction: column;
        }
        
        @media (min-width: 768px) {
            .liquid-container.portrait-layout .btn-group {
                flex-direction: row;
            }
        }
        
        .btn-primary {
            flex: 1;
            min-width: 140px;
            border: none;
            padding: clamp(12px, 2.5vw, 16px);
            border-radius: 60px;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        
        .btn-primary:active {
            transform: scale(0.96);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-wa {
            background: #25D366;
        }
        
        .btn-wa-text {
            background: #128C7E;
        }

        .msg-preview {
            background: var(--msg-preview-bg);
            border-radius: clamp(16px, 3vw, 24px);
            padding: clamp(12px, 2vw, 16px);
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: clamp(12px, 2vw, 16px);
            max-height: clamp(100px, 20vh, 150px);
            overflow-y: auto;
            color: var(--msg-text);
            border: 1px solid var(--border-light);
            line-height: 1.5;
        }

        .manual-box {
            margin-top: clamp(12px, 2vw, 16px);
            background: var(--manual-bg);
            border-radius: clamp(16px, 3vw, 24px);
            padding: clamp(10px, 2vw, 14px);
            border: 1px solid var(--manual-border);
            display: none;
        }
        
        .manual-box.show {
            display: block;
        }
        
        .manual-box textarea {
            width: 100%;
            padding: clamp(10px, 2vw, 14px);
            border-radius: 16px;
            border: 1px solid var(--manual-border);
            font-family: monospace;
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            background: var(--card-bg);
            color: var(--text-primary);
            resize: vertical;
        }
        
        .btn-select {
            background: #f59e0b;
            border: none;
            padding: clamp(8px, 1.8vw, 12px);
            border-radius: 40px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            transition: all 0.2s;
        }
        
        .btn-select:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        
        .btn-select:active {
            transform: scale(0.96);
        }

        .status {
            margin-top: clamp(12px, 2vw, 16px);
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            text-align: center;
            padding: clamp(8px, 1.8vw, 12px);
            border-radius: 40px;
            background: var(--status-bg);
            color: var(--status-text);
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        footer {
            text-align: center;
            font-size: clamp(0.55rem, 1.5vw, 0.65rem);
            color: var(--text-secondary);
            margin-top: clamp(16px, 3vw, 24px);
        }

        /* Animasi loading */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .fa-spinner, .fa-pulse {
            animation: pulse 1s ease-in-out infinite;
        }
        
        /* Scrollbar styling */
        .msg-preview::-webkit-scrollbar {
            width: 6px;
        }
        
        .msg-preview::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }
        
        .msg-preview::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 10px;
        }
        
        /* Small badge */
        .format-badge {
            font-size: 0.6rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        /* Modal Map Picker */
        .map-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        
        .map-modal.show {
            display: flex;
        }
        
        .map-container {
            width: 90%;
            max-width: 800px;
            height: 70vh;
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
        }
        
        .map-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--btn-icon-bg);
            border-bottom: 1px solid var(--border-light);
        }
        
        .map-header h3 {
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        .close-map {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 20px;
        }
        
        .close-map:hover {
            background: var(--btn-icon-hover);
        }
        
        #map {
            flex: 1;
            width: 100%;
            background: var(--preview-bg);
        }
        
        .map-footer {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: var(--btn-icon-bg);
            border-top: 1px solid var(--border-light);
        }
        
        .map-footer button {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .confirm-loc {
            background: #10b981;
            color: white;
        }
        
        .cancel-loc {
            background: var(--btn-icon-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }
        
        .selected-coord {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        @media (max-width: 600px) {
            .map-container {
                width: 95%;
                height: 80vh;
            }
        }
    </style>
</head>
<body class="dark-theme">
<div class="card">
    <!-- Settings Bar - 3 tombol toggle: Layout, Time Format, Theme -->
    <div class="settings-bar">
        <button class="settings-btn" id="layoutToggleBtn">
            <i class="fas fa-mobile-alt"></i> <span>Portrait</span>
        </button>
        <button class="settings-btn" id="timeFormatToggleBtn">
            <i class="fas fa-clock"></i> <span>24H</span>
        </button>
        <button class="settings-btn" id="themeToggleBtn">
            <i class="fas fa-moon"></i> <span>Dark Mode</span>
        </button>
    </div>
    
    <div class="liquid-container portrait-layout" id="liquidContainer">
        <!-- LEFT SECTION -->
        <div class="left-section">
            <div class="header">
                <i class="fas fa-camera-retro"></i>
                <h1>Timestamp Report</h1>
                <p>Ambil gambar | Stamp waktu & lokasi | Kirim laporan</p>
            </div>

            <!-- Tombol Galeri & Kamera -->
            <div class="image-buttons">
                <button class="btn-icon" id="galleryBtn"><i class="fas fa-images"></i> Galeri</button>
